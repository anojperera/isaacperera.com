<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#05080f"/>
  <!-- Neon accent circle -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#38e0f5" stroke-width="6"/>
  <!-- Bold "I" -->
  <text 
    x="50" 
    y="68" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-size="58" 
    font-weight="900" 
    text-anchor="middle" 
    fill="#38e0f5"
    letter-spacing="-2"
  >I</text>
  <!-- Subtle glow effect via duplicate -->
  <text 
    x="50" 
    y="68" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-size="58" 
    font-weight="900" 
    text-anchor="middle" 
    fill="#7ef0ff"
    fill-opacity="0.3"
    letter-spacing="-2"
  >I</text>
</svg>
